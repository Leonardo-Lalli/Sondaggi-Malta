<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  min-height: 100vh;
}

.hero {
  background: linear-gradient(135deg, #ff0080, #ff8c00, #40e0d0);

}

.hero p { font-size: 1.2em; margin-top: 10px; opacity: .9; }

.container { max-width: 900px; margin: 0 auto; padding: 20px; }

.user-bar {
  background: rgba(255,255,255,.1);

  padding: 20px;

}
.user-bar input {

}
.user-bar input::placeholder { color: #aaa; }
.user-bar button {
  padding: 12px 28px; border-radius: 30px; border: none;
  background: linear-gradient(135deg, #ff0080, #ff8c00);

}
.user-bar button:hover { transform: scale(1.05); }

.leaderboard {

.leaderboard h2 { text-align: center; margin-bottom: 16px; color: #ff8c00; }

.leaderboard li {

.leaderboard .votes { font-weight: 700; color: #ff8c00; }
.leaderboard .medal { font-size: 1.5em; }

.controls {

.controls select, .controls input {
  padding: 10px 16px; border-radius: 20px; border: 2px solid #ff8c00;
  background: rgba(0,0,0,.4); color: #fff; font-size: .9em; outline: none;
}

.event-card {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(10px);
  border-radius: 20px; padding: 24px; margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,.1);
  transition: transform .2s, box-shadow .2s;
}
.event-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,0,128,.2); }
.event-card h3 { font-size: 1.6em; margin-bottom: 4px; }
.event-card .date-badge {

.event-card .genre {

}
.event-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
.detail { background: rgba(255,255,255,.06); padding: 10px 14px; border-radius: 10px; }
.detail strong { color: #40e0d0; display: block; font-size: .8em; margin-bottom: 3px; }

.desc { margin: 12px 0; line-height: 1.6; opacity: .85; font-size: .95em; }
.map-container { border-radius: 12px; overflow: hidden; margin: 12px 0; height: 200px; }
.map-container iframe { width: 100%; height: 100%; border: none; }

.vote-section {
  display: flex; align-items: center; gap: 12px; margin-top: 16px;

.vote-btn {

.vote-btn:hover:not(:disabled) { transform: scale(1.05); }
.vote-btn:disabled { opacity: .4; cursor: not-allowed; }
.vote-btn.voted { background: #22c55e; }
.vote-count {

footer { text-align: center; padding: 30px; opacity: .5; font-size: .85em; }

function getMapEmbed(coords, name) {
  return `<iframe src="https://maps.google.com/maps?q=${coords}&z=15&output=embed&t=m" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="${name}"></iframe>`;
}

function renderEventCard(e, userVotes) {
  const hasVoted = userVotes && userVotes.includes(e.id);
  const vc = window.voteCounts && window.voteCounts[e.id] ? window.voteCounts[e.id] : 0;
  const vl = window.voters && window.voters[e.id] ? window.voters[e.id] : [];
  const votersStr = vl.length > 0 ? `<div class="voters">👥 ${vl.join(', ')}</div>` : '';
  return `
    <div class="event-card">
      <h3>${e.name}</h3>
      <span class="date-badge">📅 ${e.day}</span>
      <span class="genre">🎵 ${e.music}</span>
      <p class="desc">${e.description}</p>
      <div class="event-details">
        <div class="detail"><strong>📍 Location</strong><span>${e.location}</span></div>
        <div class="detail"><strong>💰 Ingresso</strong><span>${e.price}</span></div>
        <div class="detail"><strong>🍹 Drink</strong><span>${e.drinks}</span></div>
        <div class="detail"><strong>👕 Dress Code</strong><span>${e.dress}</span></div>
        <div class="detail"><strong>⏰ Orario</strong><span>${e.time}</span></div>
      </div>
      <div class="map-container">${getMapEmbed(e.coords, e.name)}</div>
      ${votersStr}
      <div class="vote-section">
        <button class="vote-btn${hasVoted?' voted':''}" ${!window.currentUser?'disabled':''}
          onclick="toggleVote('${e.id}')">
          ${hasVoted?'✅ Votata (clicca per rimuovere)':'🔥 Vota questa serata'}
        </button>
        <span class="vote-count">🗳️ ${vc} vot${vc!==1?'i':'o'}</span>
        <a href="${e.url}" target="_blank" class="ticket-link">🎟️ Biglietti</a>
      </div>
    </div>`;
}

function loginCheck() {
  const saved = localStorage.getItem('votaMalta_user');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      window.currentUser = data.name;
      window.userVotes = data.votes || [];
      document.getElementById('userName').value = data.name;
      document.getElementById('userMsg').textContent = `Ciao ${data.name}! 🎉`;
    } catch(e) {}
  }
}

function setUser() {
  const name = document.getElementById('userName').value.trim();
  if (!name) return;
  window.currentUser = name;
  const saved = localStorage.getItem('votaMalta_user');
  let votes = [];
  if (saved) {
    try { votes = JSON.parse(saved).votes || []; } catch(e) {}
  }
  localStorage.setItem('votaMalta_user', JSON.stringify({name, votes}));
  document.getElementById('userMsg').textContent = `Ciao ${name}! 🎉`;
  renderAll();
}

async function toggleVote(eventId) {
  if (!window.currentUser) { alert('Inserisci prima il tuo nome!'); return; }
  if (!db) { alert('Firebase non configurato. Vedi istruzioni.'); return; }

  const hasVoted = window.userVotes.includes(eventId);
  const voterKey = encodeURIComponent(window.currentUser);

  if (!hasVoted) {
    const voterRef = ref(db, `votes/${eventId}/voters/${voterKey}`);
    const snap = await get(voterRef);
    if (snap.exists()) { alert('Hai già votato questa serata!'); return; }

    const updates = {};
    updates[`votes/${eventId}/count`] = (window.voteCounts[eventId] || 0) + 1;
    updates[`votes/${eventId}/voters/${voterKey}`] = true;
    updates[`votes/${eventId}/name`] = EVENTS.find(e=>e.id===eventId)?.name || eventId;
    await update(ref(db), updates);

    window.userVotes.push(eventId);
    if (!window.voters[eventId]) window.voters[eventId] = [];
    if (!window.voters[eventId].includes(window.currentUser)) window.voters[eventId].push(window.currentUser);
  } else {
    const updates = {};
    updates[`votes/${eventId}/count`] = Math.max(0, (window.voteCounts[eventId] || 1) - 1);
    updates[`votes/${eventId}/voters/${voterKey}`] = null;
    await update(ref(db), updates);

    window.userVotes = window.userVotes.filter(id => id !== eventId);
    if (window.voters[eventId]) {
      window.voters[eventId] = window.voters[eventId].filter(n => n !== window.currentUser);
    }
  }

  const saved = localStorage.getItem('votaMalta_user');
  if (saved) {
    const data = JSON.parse(saved);
    data.votes = window.userVotes;
    localStorage.setItem('votaMalta_user', JSON.stringify(data));
  }
  renderAll();
}

window.setUser = setUser;
window.toggleVote = toggleVote;

function updateLeaderboard() {
  const dayFilter = document.getElementById('dayFilter')?.value || '';
  const h2 = document.querySelector('#leaderboard h2');
  let list = EVENTS;
  if (dayFilter) {
    list = list.filter(e => e.date === dayFilter);
    const dayName = list.length > 0 ? list[0].day : '';
    h2.textContent = `🏆 Migliore serata — ${dayName}`;
  } else {
    h2.textContent = '🏆 Classifica Serate';
  }
  const sorted = list.map(e => ({id:e.id, name:e.name, count:window.voteCounts[e.id]||0}))
    .sort((a,b) => b.count - a.count);
  const ol = document.getElementById('ranking');
  const medals = ['🥇','🥈','🥉'];
  ol.innerHTML = sorted.map((e,i) => `
    <li class="${i<3?'top'+(i+1):''}">
      <span class="pos">${i<3?medals[i]:'#'+(i+1)}</span>
      <span class="name">${e.name}</span>
      <span class="votes">${e.count} vot${e.count!==1?'i':'o'}</span>
    </li>`).join('');
}

function renderEvents() {
  const dayFilter = document.getElementById('dayFilter')?.value || '';
  const locFilter = document.getElementById('locationFilter')?.value || '';

  let filtered = EVENTS;
  if (dayFilter) filtered = filtered.filter(e => e.date === dayFilter);
  if (locFilter) filtered = filtered.filter(e => e.location.toLowerCase().includes(locFilter.toLowerCase()));

  const container = document.getElementById('eventsContainer');
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;padding:40px;opacity:.5;">Nessuna serata trovata con questi filtri</p>';
    return;
  }
  container.innerHTML = filtered.map(e => renderEventCard(e, window.userVotes)).join('');

  // Populate filters
  const daySelect = document.getElementById('dayFilter');
  if (daySelect && daySelect.options.length <= 1) {
    const days = [...new Set(EVENTS.map(e => e.date))].sort();
    days.forEach(d => {
      const e = EVENTS.find(ev => ev.date === d);
      daySelect.innerHTML += `<option value="${d}">${e.day}</option>`;
    });
  }
  const locSelect = document.getElementById('locationFilter');
  if (locSelect && locSelect.options.length <= 1) {
    const locs = [...new Set(EVENTS.map(e => e.location.split(',')[0].trim()))].sort();
    locs.forEach(l => { locSelect.innerHTML += `<option value="${l}">${l}</option>`; });
  }
  updateLeaderboard();
}

// Firebase listeners
function setupFirebase() {
  if (!db) return;
  EVENTS.forEach(e => {
    const countRef = ref(db, `votes/${e.id}/count`);
    onValue(countRef, snap => {
      window.voteCounts[e.id] = snap.val() || 0;
      updateLeaderboard();
      renderEvents();
    });
    const votersRef = ref(db, `votes/${e.id}/voters`);
    onValue(votersRef, snap => {
      const data = snap.val();
      window.voters[e.id] = data ? Object.keys(data) : [];
      updateLeaderboard();
      renderEvents();
    });
  });
}

loginCheck();
setupFirebase();
renderAll();

// Re-render periodically for live updates
setInterval(() => {
  if (db) {
    updateLeaderboard();
    renderEvents();
  }
}, 5000);

// Expose for inline onclick
window.renderEvents = renderEvents;
</script>

</body>
</html>
